<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>管理者ログイン</title>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getDatabase, ref, push, set } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        // ① あなたのFirebaseプロジェクトの設定（コンソールからコピーしてください）
        const firebaseConfig = {
            apiKey: "AIzaSyA2u57VpGJE0Wz8d4oY9Wl5iBNR06o64Qc",
            authDomain: "kaikeikanri.firebaseapp.com",
            databaseURL: "https://kaikeikanri-default-rtdb.firebaseio.com",
            projectId: "kaikeikanri",
            storageBucket: "kaikeikanri.firebasestorage.app",
            messagingSenderId: "999938866846",
            appId: "1:999938866846:web:e50f53f9de04c1e84b058f"
        };

        // Firebase初期化
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        // --- ログイン処理 ---
        document.getElementById('login-btn').addEventListener('click', () => {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            signInWithEmailAndPassword(auth, email, password)
                .then((userCredential) => {
                    alert("ログイン成功！");
                })
                .catch((error) => {
                    alert("ログイン失敗: " + error.message);
                });
        });

        // --- ログイン状態の監視 ---
        onAuthStateChanged(auth, (user) => {
            const adminArea = document.getElementById('admin-area');
            const loginForm = document.getElementById('login-form');

            if (user) {
                // ログインしている場合：編集フォームを表示
                adminArea.style.display = 'block';
                loginForm.style.display = 'none';
                document.getElementById('user-info').innerText = `${user.email} でログイン中`;
            } else {
                // ログインしていない場合：ログインフォームを表示
                adminArea.style.display = 'none';
                loginForm.style.display = 'block';
            }
        });

        // --- データ追加（書き込み）処理 ---
        document.getElementById('add-data-btn').addEventListener('click', () => {
            const title = document.getElementById('title-input').value;
            const amount = document.getElementById('amount-input').value;

            // 「kaikei」ノードに新しいデータを追加
            const kaikeiRef = ref(db, 'kaikei');
            const newPostRef = push(kaikeiRef); // 自動で新しいID（$postIdに相当）を発行
            
            set(newPostRef, {
                title: title,
                amount: Number(amount)
                // 💡 今回のルールはあなたの「UID」自体をチェックするため、データ内にUIDを含めなくても書き込み可能です！
            }).then(() => {
                alert("データを追加しました！");
                document.getElementById('title-input').value = "";
                document.getElementById('amount-input').value = "";
            }).catch((error) => {
                alert("エラー: " + error.message);
            });
        });

        // --- ログアウト処理 ---
        document.getElementById('logout-btn').addEventListener('click', () => {
            signOut(auth);
        });
    </script>
</head>
<body>

    <div id="login-form">
        <h2>管理者ログイン</h2>
        <input type="email" id="email" placeholder="メールアドレス"><br><br>
        <input type="password" id="password" placeholder="パスワード"><br><br>
        <button id="login-btn">ログイン</button>
    </div>

    <div id="admin-area" style="display: none;">
        <h2>会計データの追加</h2>
        <p id="user-info"></p>
        
        <input type="text" id="title-input" placeholder="項目名（例: 文房具代）"><br><br>
        <input type="number" id="amount-input" placeholder="金額（例: 1500）"><br><br>
        <button id="add-data-btn">データを登録する</button>
        
        <br><br>
        <hr>
        <button id="logout-btn">ログアウト</button>
    </div>

</body>
</html>
